<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MilFun</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="setup-overlay" class="setup-overlay hidden">
    <div class="setup-panel">
      <div class="setup-title">初始化中</div>
      <div id="setup-log" class="setup-log"></div>
    </div>
  </div>

  <div class="app">
    <header class="header">
      <span class="app-title">MilFun</span>
      <div class="header-actions">
        <span id="license-badge" class="auth-dot" title="Checking license..."></span>
        <div class="settings-wrap">
          <button id="btn-settings" class="btn-icon" title="设置">⚙</button>
          <div id="settings-popover" class="settings-popover hidden">
            <div class="popover-section">
              <div class="popover-label">功能开关</div>
              <label class="toggle-row">
                <span>JS 混淆</span>
                <input type="checkbox" id="cfg-obfuscation" checked />
              </label>
              <label class="toggle-row">
                <span>图片重哈希</span>
                <input type="checkbox" id="cfg-image" checked />
              </label>
              <label class="toggle-row">
                <span>音频处理</span>
                <input type="checkbox" id="cfg-audio" checked />
              </label>
            </div>
            <div class="popover-divider"></div>
            <button id="btn-import-license" class="popover-item">Import License</button>
            <button id="btn-fingerprint" class="popover-item">Copy Fingerprint</button>
          </div>
        </div>
      </div>
    </header>
    <p id="license-text" class="license-text">Checking license...</p>

    <section class="source-block">
      <div class="row-head">
        <span class="label">源码</span>
        <button id="btn-browse" class="btn-text">浏览</button>
      </div>
      <div id="source-dir" class="source-path">./src</div>
    </section>

    <button id="btn-start" class="btn-start" disabled>▶ 开始处理</button>

    <div id="log-output" class="log-box"></div>

    <footer class="progress-footer">
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <span id="progress-percent" class="progress-pct">0%</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
